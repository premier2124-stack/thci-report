<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow"><!-- 검색 노출 차단: 링크 아는 사람만 -->
<title>THCI 데일리 리포트</title>
<style>
  :root{ --bg:#1b1a17; --panel:#242220; --panel2:#201e1b; --border:#36332e; --text:#ece9e3;
         --muted:#9a948a; --muted2:#6b655c; --accent:#3b82f6; --red:#ef4444; --blue:#4fc3f7; }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,system-ui,sans-serif;
       background:var(--bg);color:var(--text);line-height:1.6}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#2c2a27,#37342f);
         padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
  header h1{font-size:16px;font-weight:800;margin:0;letter-spacing:.3px}
  header .sub{font-size:11px;opacity:.85;font-weight:600}
  header .menu{margin-left:auto;display:none;background:rgba(255,255,255,.15);border:none;color:#fff;
       font-size:18px;border-radius:8px;width:36px;height:36px;cursor:pointer}
  .toggle{position:sticky;top:50px;z-index:4;display:flex;flex-wrap:wrap;gap:8px;padding:10px 16px;
       background:var(--panel2);border-bottom:1px solid var(--border)}
  .toggle button{flex:1;max-width:200px;background:var(--panel);border:1px solid var(--border);
       color:var(--muted);font-size:13px;font-weight:700;font-family:inherit;padding:9px 12px;
       border-radius:9px;cursor:pointer;transition:all .12s}
  .toggle button:hover{color:var(--text);border-color:var(--muted2)}
  .toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .wrap{display:flex;min-height:calc(100vh - 50px)}
  aside#cats{width:190px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel2);
        overflow-y:auto;max-height:calc(100vh - 105px);position:sticky;top:105px}
  #cards{width:290px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel2);
        overflow-y:auto;max-height:calc(100vh - 105px);position:sticky;top:105px}
  .cat{display:flex;align-items:center;gap:6px;padding:12px 14px;border-bottom:1px solid var(--border);
        cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);transition:background .12s}
  .cat:hover{background:var(--panel);color:var(--text)}
  .cat.active{background:rgba(59,130,246,.14);border-left:3px solid var(--accent);color:var(--text)}
  .cat .cnt{margin-left:auto;font-size:11px;color:var(--muted2);background:var(--panel);border-radius:10px;padding:1px 8px}
  .card{display:block;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;
        text-decoration:none;color:var(--text);transition:background .12s}
  .card:hover{background:var(--panel)}
  .card.active{background:rgba(59,130,246,.14);border-left:3px solid var(--accent)}
  .list-item{display:block;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;
        text-decoration:none;color:var(--text);transition:background .12s}
  .list-item:hover{background:var(--panel)}
  .list-item.active{background:rgba(59,130,246,.14);border-left:3px solid var(--accent)}
  .li-date{font-size:12px;color:var(--accent);font-weight:700;font-family:'Courier New',monospace}
  .li-title{font-size:13px;color:var(--text);margin-top:2px;font-weight:600}
  /* 그룹(월별/섹터별) 헤더 */
  .group-h{display:flex;align-items:center;gap:7px;padding:10px 14px;background:var(--panel);
        border-bottom:1px solid var(--border);border-top:1px solid var(--border);cursor:pointer;
        font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.3px;user-select:none}
  .group-h:hover{color:var(--text)}
  .group-h .caret{font-size:9px;transition:transform .15s;color:var(--muted2)}
  .group-h.collapsed .caret{transform:rotate(-90deg)}
  .group-h .cnt{margin-left:auto;font-size:11px;color:var(--muted2);font-weight:700;
        background:var(--panel2);border-radius:10px;padding:1px 8px}
  .group-body.collapsed{display:none}
  main{flex:1;min-width:0;padding:28px 36px 80px;overflow-x:hidden}
  .empty,.err{color:var(--muted);text-align:center;padding:60px 20px;font-size:14px}
  .err{color:#fca5a5}
  .spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);
        border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* 마크다운 렌더 */
  .md{max-width:900px;margin:0}
  .md h1{font-size:26px;border-bottom:2px solid var(--border);padding-bottom:10px;margin:.2em 0 .6em}
  .md h2{font-size:20px;border-bottom:1px solid var(--border);padding-bottom:6px;margin:1.4em 0 .5em;color:var(--text)}
  .md h3{font-size:16px;margin:1.2em 0 .4em;color:var(--accent)}
  .md h4{font-size:14px;margin:1em 0 .3em;color:var(--muted)}
  .md p,.md li{font-size:14.5px}
  .md blockquote{border-left:3px solid var(--accent);background:var(--panel);margin:.8em 0;
        padding:8px 14px;border-radius:0 8px 8px 0;color:var(--muted)}
  .md table{border-collapse:collapse;width:100%;margin:1em 0;font-size:13.5px}
  .md th,.md td{border:1px solid var(--border);padding:7px 10px;text-align:left}
  .md th{background:var(--panel);font-weight:700}
  .md code{background:var(--panel);padding:2px 6px;border-radius:4px;font-size:13px}
  .md pre{background:var(--panel);padding:14px;border-radius:10px;overflow-x:auto;border:1px solid var(--border)}
  .md pre code{background:none;padding:0}
  .md a{color:var(--accent);text-decoration:none} .md a:hover{text-decoration:underline}
  .md hr{border:none;border-top:1px solid var(--border);margin:1.6em 0}
  .md img{max-width:100%}
  /* 음성 읽기 툴바 */
  .rtoolbar{display:flex;align-items:center;gap:14px;margin:0 0 16px;flex-wrap:wrap}
  .rtoolbar button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 15px;
        font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .rtoolbar button:hover{filter:brightness(1.1)}
  .rtoolbar .stopbtn{background:var(--panel);color:var(--muted);border:1px solid var(--border)}
  .rtoolbar .stopbtn:hover{color:var(--text);filter:none}
  .rspeed{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .rspeed input{accent-color:var(--accent)}
  @media(max-width:820px){
    .wrap{flex-direction:column}
    aside#cats,#cards{width:100%;max-height:none;position:static;border-right:none;
          border-bottom:1px solid var(--border);display:flex;overflow-x:auto;overflow-y:hidden}
    .cat,.card{flex:0 0 auto;border-bottom:none;border-right:1px solid var(--border);white-space:nowrap}
    header .menu{display:none}
    main{padding:18px 16px 60px}
    .md h1{font-size:21px} .md h2{font-size:17px}
  }
</style>
</head>
<body>
<header>
  <div><h1>📈 THCI 데일리 리포트</h1><div class="sub">한국증시 데일리 마켓 리뷰</div></div>
  <button class="menu" onclick="document.querySelector('aside').classList.toggle('open')">☰</button>
</header>
<div class="toggle">
  <button id="tEvening" class="active" onclick="setType('evening')">🌆 마감 리뷰</button>
  <button id="tPre" onclick="setType('premarket')">🌅 장전 브리핑</button>
  <button id="tWeekly" onclick="setType('weekly')">📅 주간 리뷰</button>
  <button id="tMonthly" onclick="setType('monthly')">🗓 월간 리뷰</button>
  <button id="tAnalysis" onclick="setType('analysis')">🔎 종목 분석</button>
</div>
<div class="wrap">
  <aside id="cats"><div class="spinner"></div></aside>
  <div id="cards"><div class="empty" style="padding:20px">카테고리를 선택하세요.</div></div>
  <main id="content"><div class="empty">리포트를 선택하세요.</div></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

// 파일 → 그룹 키 (종목분석=섹터, 그 외=월)
function groupKey(name, p){
  if(_type==='analysis'){
    const base = name.replace(/\.md$/i,'');
    const m = base.match(/^\d{4}-\d{2}-\d{2}[_-](.+?)_(기업분석|종합)/);
    if(m){ if(m[2]==='종합') return '📊 섹터 종합'; return SECTORS[m[1].trim()] || '기타'; }
    const comp = (p.title||'').replace(/\s*기업분석\s*$/,'').trim();
    return SECTORS[comp] || '기타';
  }
  const d = p.date; if(!d) return '기타';
  return d.slice(0,4)+'년 '+d.slice(5,7)+'월';
}

  h.classList.toggle('collapsed');
  const b = h.nextElementSibling;
  if(b && b.classList.contains('group-body')) b.classList.toggle('collapsed');
}
const apiUrl = ()=> `https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER[_type]}`;

const $cats = document.getElementById('cats');
const $cards = document.getElementById('cards');
const $content = document.getElementById('content');
let _groups = new Map();

function setType(t){
  if(t===_type) return;
  _type = t;
  Object.entries(TAB_BTN).forEach(([k,id])=>{ const b=document.getElementById(id); if(b) b.classList.toggle('active', t===k); });
  $cards.innerHTML = '<div class="empty" style="padding:20px">카테고리를 선택하세요.</div>';
  $content.innerHTML = '<div class="empty">리포트를 선택하세요.</div>';
  loadList();
}

// 파일명 → {date, title}  (예: 2026-06-19_한국증시_데일리리뷰.md)
function parseName(name){
  const base = name.replace(/\.md$/i, '');
  const m = base.match(/^(\d{4}-\d{2}-\d{2})[_-]?(.*)$/);
  const date = m ? m[1] : '';
  let title = (m ? m[2] : base).replace(/_/g, ' ').trim();
  return { date, title: title || base };
}
// 프론트매터(--- ... ---) 제거 후 렌더
function stripFM(md){ return md.replace(/^﻿?---\r?\n[\s\S]*?\r?\n---\r?\n/, ''); }

async function loadList(){
  if(!USER || !REPO){ $cats.innerHTML='<div class="err" style="padding:20px">로컬에선 미리보기 불가 —<br>GitHub Pages에서 열어주세요.</div>'; return; }
  try{
    $cats.innerHTML='<div class="spinner"></div>';
    const r = await fetch(apiUrl());
    if(r.status===404){ $cats.innerHTML='<div class="empty" style="padding:20px">아직 리포트가 없습니다.</div>'; return; }
    if(!r.ok) throw new Error('목록 조회 실패 ('+r.status+(r.status===403?' · API 한도, 잠시 후':'')+')');
    let files = (await r.json()).filter(f=>/\.md$/i.test(f.name));
    const _flt = TYPE_FILTER[_type]; if(_flt) files = files.filter(f=>_flt(f.name));   // 탭별 파일명 분류
    files.sort((a,b)=> b.name.localeCompare(a.name));   // 파일명(날짜) 역순 = 최신 먼저
    if(!files.length){ $cats.innerHTML='<div class="empty" style="padding:20px">리포트가 없습니다.</div>'; return; }
    // 그룹핑: 종목분석=섹터별 / 그 외=월별
    _groups = new Map();
    for(const f of files){
      const p = parseName(f.name);
      const g = groupKey(f.name, p);
      if(!_groups.has(g)) _groups.set(g, []);
      _groups.get(g).push({f, p});
    }
    let order = [..._groups.keys()];
    if(_type==='analysis'){
      const rank = g => g==='기타' ? 2 : (g==='📊 섹터 종합' ? 1 : 0);   // 기타·섹터종합은 맨 아래
      const newest = g => _groups.get(g).map(o=>o.f.name).sort().slice(-1)[0] || '';
      order.sort((a,b)=> (rank(a)-rank(b)) || newest(b).localeCompare(newest(a)));  // 최근 분석한 섹터 먼저
    }else{
      order.sort((a,b)=> b.localeCompare(a));   // 최신 월 먼저
    }
    // 왼쪽: 카테고리 목록 (첫 카테고리 자동 선택)
    $cats.innerHTML = order.map((g,i)=>
      `<div class="cat${i===0?' active':''}" data-g="${encodeURIComponent(g)}" onclick="selectCat(this)">`
      + `<span>${g}</span><span class="cnt">${_groups.get(g).length}</span></div>`).join('');
    const firstCat = $cats.querySelector('.cat'); if(firstCat) selectCat(firstCat);
  }catch(e){ $cats.innerHTML='<div class="err" style="padding:20px">'+e.message+'</div>'; }
}

// 카테고리 선택 → 가운데에 해당 리포트 카드들, 첫 카드 자동 열기
function selectCat(el){
  document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  const items = _groups.get(decodeURIComponent(el.dataset.g)) || [];
  $cards.innerHTML = items.map((o,i)=>
    `<a class="card${i===0?' active':''}" data-url="${o.f.download_url}" onclick="openReport(this)">`
    + `<div class="li-date">${o.p.date||'—'}</div><div class="li-title">${o.p.title}</div></a>`).join('');
  const firstCard = $cards.querySelector('.card'); if(firstCard) openReport(firstCard);
}

// ── 음성 읽기 (브라우저 내장 TTS, 무료·서버 불필요) ──
let _voices = [];
function loadVoices(){ _voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
function pickKoVoice(){ return _voices.find(v=>/^ko/i.test(v.lang)) || _voices.find(v=>/korean|한국/i.test(v.name)) || null; }
let _tts = 'idle';   // idle | playing | paused
function setTtsBtn(){ const b=document.getElementById('ttsBtn'); if(b)
  b.textContent = _tts==='playing' ? '⏸ 일시정지' : (_tts==='paused' ? '▶ 이어듣기' : '🔊 읽어주기'); }
function stopSpeak(){ if(window.speechSynthesis) speechSynthesis.cancel(); _tts='idle'; setTtsBtn(); }
// 음성용 텍스트 정리: 이모지·화살표·도형·마크다운 잔재(별표 등)를 제거
function cleanForSpeech(t){
  return t
    .replace(/[\u{1F000}-\u{1FAFF}]/gu,' ')                 // 이모지(🎯📊🔥🌆 등)
    .replace(/[☀-➿]/g,' ')                        // 기호·딩뱃(✅❌⚠⚙☑ 등)
    .replace(/[←-⇿⬀-⯿■-◿]/g,' ') // 화살표·도형(▸▾→←■ 등)
    .replace(/[️‍]/g,'')                          // variation selector / ZWJ
    .replace(/[*_`#>|~]/g,' ')                              // 마크다운 잔재(**, _, # 등)
    .replace(/[=\-─—–]{2,}/g,' ')                           // 구분선(====, ----)
    .replace(/\s+/g,' ').trim();
}
// 읽을 텍스트 추출: 제목·문단·리스트·인용구만 (표·코드는 건너뜀)
function extractReadable(md){
  const out=[];
  md.querySelectorAll('h1,h2,h3,h4,p,li,blockquote').forEach(el=>{
    if(el.closest('table') || el.closest('pre')) return;
    const t = cleanForSpeech(el.textContent);
    if(t) out.push(t);
  });
  return out;
}
function ttsToggle(){
  if(!window.speechSynthesis){ alert('이 브라우저는 음성 읽기를 지원하지 않습니다.'); return; }
  if(_tts==='playing'){ speechSynthesis.pause();  _tts='paused';  setTtsBtn(); return; }   // 일시정지
  if(_tts==='paused'){  speechSynthesis.resume(); _tts='playing'; setTtsBtn(); return; }   // 이어듣기
  // idle → 처음부터 재생
  const md = $content.querySelector('.md'); if(!md) return;
  const chunks = extractReadable(md); if(!chunks.length) return;
  const voice = pickKoVoice();
  const rate = parseFloat((document.getElementById('ttsRate')||{}).value || '1');
  _tts='playing'; setTtsBtn();
  let i=0;
  const next = ()=>{
    if(_tts==='idle' || i>=chunks.length){ _tts='idle'; setTtsBtn(); return; }
    const u = new SpeechSynthesisUtterance(chunks[i]);
    u.lang='ko-KR'; if(voice) u.voice=voice; u.rate=rate; u.pitch=1;
    u.onend=()=>{ i++; next(); };
    u.onerror=()=>{ i++; next(); };
    speechSynthesis.speak(u);
  };
  next();
}

async function openReport(el){
  document.querySelectorAll('.card').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  stopSpeak();   // 다른 리포트 열면 읽기 중지
  $content.innerHTML='<div class="spinner"></div>';
  try{
    const md = await (await fetch(el.dataset.url)).text();
    $content.innerHTML =
      '<div class="rtoolbar"><button id="ttsBtn" onclick="ttsToggle()">🔊 읽어주기</button>'
      + '<button class="stopbtn" onclick="stopSpeak()">⏹ 처음으로</button>'
      + '<label class="rspeed">속도 <input id="ttsRate" type="range" min="0.7" max="1.6" step="0.1" value="1"></label></div>'
      + '<div class="md">'+marked.parse(stripFM(md))+'</div>';
    $content.scrollTop=0; window.scrollTo(0,0);
  }catch(e){ $content.innerHTML='<div class="err">불러오기 실패: '+e.message+'</div>'; }
}
loadList();
</script>
